services:
  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped

    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # - "67:67/udp"   # Uncomment if using Pi-hole as DHCP server
      # - "123:123/udp" # Uncomment if using Pi-hole as NTP server

    environment:
      TZ: "${TZ}"
      FTLCONF_dns_listeningMode: "ALL"
      WEBPASSWORD_FILE: "pihole_web_password"
      # FTLCONF_misc_etc_dnsmasq_d: "true"

    volumes:
      - ./config/pihole/etc-pihole:/etc/pihole
      # - ./config/pihole/etc-dnsmasq.d:/etc/dnsmasq.d

    secrets:
      - pihole_web_password

    cap_add:
      - NET_ADMIN
      - SYS_TIME
      - SYS_NICE

    networks:
      home_network:
        ipv4_address: "${PIHOLE_IPV4_ADDRESS}"

  caddy:
    container_name: caddy
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    environment:
      TZ: "${TZ}"
      SEARXNG_HOSTNAME: "${SEARXNG_HOSTNAME}"

    command: >
      sh -c 'export CLOUDFLARE_API_TOKEN="$$(cat /run/secrets/cloudflare_api_token)" &&
             exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile'

    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./config/caddy/data:/data
      - ./config/caddy/config:/config

    secrets:
      - cloudflare_api_token

    networks:
      - proxy_network

  searxng:
    container_name: searxng
    image: searxng/searxng:latest
    restart: unless-stopped

    environment:
      TZ: "${TZ}"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL}"
      SEARXNG_SECRET: "${SEARXNG_SECRET}"

    volumes:
      - ./config/searxng/:/etc/searxng/
      - ./config/searxng/data:/var/cache/searxng

    networks:
      - proxy_network
  postgres:
    container_name: postgres
    image: postgres:latest
    restart: unless-stopped

    env_file:
      - ./runtime/server01/secrets/postgres.env

    volumes:
      - ./config/postgres/data:/var/lib/postgresql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

    networks:
      - proxy_network

  n8n:
    container_name: n8n
    image: n8nio/n8n:latest
    restart: unless-stopped
    env_file:
      - ./env/server01.env
      - ./runtime/server01/secrets/n8n.env
    environment:
      TZ: "${TZ}"
      N8N_HOST: "${N8N_HOSTNAME}"
      N8N_EDITOR_BASE_URL: "${N8N_EDITOR_BASE_URL}"
      N8N_PROTOCOL: "${N8N_PROTOCOL}"
      N8N_PORT: "${N8N_PORT}"
      WEBHOOK_URL: "${N8N_EDITOR_BASE_URL}"
      N8N_RUNNERS_ENABLED: "${N8N_RUNNERS_ENABLED}"
      NODES_EXCLUDE: "[]"
    volumes:
      - ./config/n8n/data:/home/node/.n8n
      - ./scripts:/scripts:ro
    networks:
      - proxy_network

  monkeytype-mongodb:
    container_name: monkeytype-mongodb
    image: mongo:latest
    restart: unless-stopped
    profiles: ["apps"]

    volumes:
      - ./config/monkeytype/mongodb:/data/db

    networks:
      - proxy_network

  monkeytype-redis:
    container_name: monkeytype-redis
    image: redis:latest
    restart: unless-stopped
    profiles: ["apps"]

    volumes:
      - ./config/monkeytype/redis:/data

    networks:
      - proxy_network

  monkeytype-backend:
    container_name: monkeytype-backend
    image: monkeytype/monkeytype-backend:latest
    restart: unless-stopped
    profiles: ["apps"]

    depends_on:
      - monkeytype-mongodb
      - monkeytype-redis

    environment:
      DB_NAME: "monkeytype"
      DB_URI: "mongodb://monkeytype-mongodb:27017"
      REDIS_URI: "redis://monkeytype-redis:6379"
      FRONTEND_URL: "${MONKEYTYPE_FRONTEND_URL}"
      RECAPTCHA_SECRET: "${MONKEYTYPE_RECAPTCHA_SECRET}"
      EMAIL_HOST: "${MONKEYTYPE_EMAIL_HOST}"
      EMAIL_PORT: "${MONKEYTYPE_EMAIL_PORT}"
      EMAIL_USER: "${MONKEYTYPE_EMAIL_USER}"
      EMAIL_PASS: "${MONKEYTYPE_EMAIL_PASS}"

    volumes:
      - ./config/monkeytype/backend-configuration.json:/app/backend/dist/backend-configuration.json:ro
      - ./runtime/server01/secrets/monkeytype-serviceAccountKey.json:/app/backend/src/credentials/serviceAccountKey.json:ro

    networks:
      - proxy_network

  monkeytype-frontend:
    container_name: monkeytype-frontend
    image: monkeytype/monkeytype-frontend:latest
    restart: unless-stopped
    profiles: ["apps"]

    depends_on:
      - monkeytype-backend

    environment:
      MONKEYTYPE_BACKENDURL: "${MONKEYTYPE_BACKEND_URL}"
      FIREBASE_APIKEY: "${MONKEYTYPE_FIREBASE_APIKEY}"
      FIREBASE_AUTHDOMAIN: "${MONKEYTYPE_FIREBASE_AUTHDOMAIN}"
      FIREBASE_PROJECTID: "${MONKEYTYPE_FIREBASE_PROJECTID}"
      FIREBASE_STORAGEBUCKET: "${MONKEYTYPE_FIREBASE_STORAGEBUCKET}"
      FIREBASE_MESSAGINGSENDERID: "${MONKEYTYPE_FIREBASE_MESSAGINGSENDERID}"
      FIREBASE_APPID: "${MONKEYTYPE_FIREBASE_APPID}"
      RECAPTCHA_SITE_KEY: "${MONKEYTYPE_RECAPTCHA_SITE_KEY}"

    networks:
      - proxy_network

secrets:
  pihole_web_password:
    file: ./runtime/server01/secrets/pihole_web_password.txt
  cloudflare_api_token:
    file: ./runtime/server01/secrets/cloudflare_api_token.txt

networks:
  home_network:
    driver: macvlan
    driver_opts:
      parent: "${PIHOLE_PARENT_INTERFACE}"
    ipam:
      config:
        - subnet: "${PIHOLE_SUBNET}"
          gateway: "${PIHOLE_GATEWAY}"

  proxy_network:
    driver: bridge
